version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: hospital-app
    restart: unless-stopped
    ports:
      - "3010:5000"
    env_file:
      - ../backend/.env
    environment:
      - NODE_ENV=production
      - INTERNAL_LAN=true
      - PORT=5000
    volumes:
      # Mount external env folder — backend.env inside is auto-loaded by start.sh
      - /home/ggh/env:/env:ro

networks:
  default:
    driver: bridge
