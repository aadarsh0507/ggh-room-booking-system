version: '3.8'

# Load env from project root .env (for variable substitution and container env).
# Create .env with SQL_*, MONGODB_*, etc. See ENV-DOCKER.md or backend/ENV_SETUP.md.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biometric_dashboard_app
    env_file:
      - .env
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
      - BACKEND_PORT=5000
      # CORS - allow requests from frontend
      - CLIENT_ORIGIN=http://localhost
      # Explicitly unset Docker API variables to prevent runtime Docker API access
      - DOCKER_HOST=
      - DOCKER_TLS_VERIFY=
      - DOCKER_CERT_PATH=
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
